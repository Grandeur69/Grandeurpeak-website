<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grandeur Peak - Contact</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; color: #333; }
    nav { background: #1a1a1a; padding: 1rem; }
    nav a { color: white; text-decoration: none; margin-right: 1.5rem; }
    nav a:hover { color: #4dabf7; }
    .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1rem; }
    input, textarea { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 4px; }
    button { background: #4dabf7; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #339af0; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </nav>
  
  <div class="container">
    <h1>Contact</h1>
    <p>Email me at: your-email@example.com</p>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send</button>
    </form>
    <p><small>Note: Forms need Netlify Forms or backend to work. For now this is just display.</small></p>
  </div>
</body>
</html>
